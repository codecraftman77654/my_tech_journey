<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato Clone</title>
    <style>
        /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#111;
    color:white;
    overflow-x:hidden;
}

/* ================= HEADER ================= */

header{
    width:100%;
    height:80px;
    position:fixed;
    top:0;
    left:0;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 8%;

    background:rgba(0,0,0,0.55);
    backdrop-filter:blur(12px);
}

.logo img{
    height:55px;
    cursor:pointer;
}

header ul{
    display:flex;
    list-style:none;
    gap:35px;
}

header ul li a{
    text-decoration:none;
    color:white;
    font-size:17px;
    transition:.3s;
}

header ul li a:hover{
    color:#ff4d4d;
}

/* ================= HERO SECTION ================= */

main{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
}

main img{
    width:100%;
    height:100%;
    object-fit:cover;
    filter:brightness(35%);
}

main p{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;

    width:80%;
}

main p{
    font-size:3rem;
    font-weight:600;
    color:white;
    text-shadow:2px 2px 20px black;
}

/* Search Box */

main input{
    display:block;
    width:70%;
    margin:40px auto 0;
    padding:18px 25px;

    border:none;
    border-radius:50px;

    outline:none;

    font-size:17px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);

    color:white;

    transition:.3s;
}

main input::placeholder{
    color:#ddd;
}

main input:focus{
    width:75%;
    background:white;
    color:black;
    box-shadow:0 0 20px rgba(255,0,0,.5);
}

/* ================= FOOTER ================= */

footer{
    background:#000;
    text-align:center;
    padding:18px;
    font-size:15px;
    letter-spacing:1px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:900px){

    header{
        flex-direction:column;
        height:auto;
        padding:20px;
    }

    header ul{
        margin-top:15px;
        gap:20px;
        flex-wrap:wrap;
        justify-content:center;
    }

    main p{
        font-size:2.2rem;
        width:90%;
    }

    main input{
        width:90%;
    }
}

@media(max-width:600px){

    main p{
        font-size:1.6rem;
    }

    header ul{
        gap:15px;
        font-size:14px;
    }

    main input{
        padding:15px;
        font-size:15px;
    }
}
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="Free Zomato Old Logo Vector Download _ Logowik.jpg" alt="">

        </div>

        <ul>
            <li>
                <a href="">Investor Relation</a>
            </li>
            <li>
                <a href="">Add restaurent</a>
            </li>
            <li>
                <a href="">login</a>
            </li>
            <li><a href=""></a>Signup</li>
        </ul>
    </header>

    <main>
<img src="bg2.jpeg" alt="Background Image">
<p> Discover the best hospitality at katihar.
    <input placeholder="Search for restaurent, cuisine or a dish" >
</p>
    </main>


    <footer>
        Copyright &copy; | All rights reserved.
    </footer>
   <script>
    // Header background on scroll

const header = document.querySelector("header");

window.addEventListener("scroll", () => {

    if(window.scrollY > 50){
        header.style.background = "rgba(0,0,0,0.85)";
    }

    else{
        header.style.background = "rgba(0,0,0,0.55)";
    }

});

// Search Box

const searchBox = document.querySelector("input");

searchBox.addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        let search = searchBox.value.trim();

        if(search === ""){
            alert("Please enter something to search.");
        }

        else{
            alert("Searching for : " + search);

            // Future:
            // window.location.href = "search.html?q=" + encodeURIComponent(search);
        }

    }

});

// Logo Animation

const logo = document.querySelector(".logo img");

logo.addEventListener("mouseenter", () => {
    logo.style.transform = "scale(1.1)";
    logo.style.transition = ".3s";
});

logo.addEventListener("mouseleave", () => {
    logo.style.transform = "scale(1)";
});
   </script>
</body>
</html>
