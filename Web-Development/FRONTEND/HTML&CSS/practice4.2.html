<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelZero.com - Book Your Vacation to Kedarnath</title>

   <style>
    /* ===========================
   Google Font
=========================== */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

/* ===========================
   Reset
=========================== */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

/* ===========================
   Body
=========================== */
body{
    background: linear-gradient(135deg, #2193b0, #6dd5ed);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
}

/* ===========================
   Form Container
=========================== */
.container{
    width: 100%;
    max-width: 700px;
    background: #ffffff;
    border-radius: 18px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

/* ===========================
   Heading
=========================== */
.container h1{
    text-align: center;
    color: #0b4f6c;
    margin-bottom: 30px;
    font-size: 2rem;
    font-weight: 700;
}

/* ===========================
   Form Group
=========================== */
.form-group{
    margin-bottom: 20px;
}

.form-group label{
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
}

/* ===========================
   Inputs
=========================== */
.form-group input,
.form-group select,
.form-group textarea{
    width: 100%;
    padding: 13px 15px;
    font-size: 15px;
    border: 2px solid #d8d8d8;
    border-radius: 10px;
    outline: none;
    transition: all 0.3s ease;
    background: #fafafa;
}

/* Placeholder */

::placeholder{
    color: #888;
}

/* Focus Effect */

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color: #2193b0;
    background: #fff;
    box-shadow: 0 0 8px rgba(33,147,176,0.3);
}

/* Textarea */

textarea{
    resize: vertical;
}

/* File Input */

input[type="file"]{
    padding: 10px;
    background: #fff;
}

/* Checkbox */

input[type="checkbox"]{
    width: auto;
    margin-right: 10px;
    transform: scale(1.15);
    cursor: pointer;
}

/* Checkbox Label */

.form-group label:has(input[type="checkbox"]){
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 500;
}

/* ===========================
   Buttons
=========================== */

input[type="submit"],
input[type="reset"]{
    width: 100%;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

/* Submit */

input[type="submit"]{
    background: #2193b0;
    color: white;
}

input[type="submit"]:hover{
    background: #176b87;
    transform: translateY(-2px);
}

/* Reset */

input[type="reset"]{
    background: #e74c3c;
    color: white;
}

input[type="reset"]:hover{
    background: #c0392b;
    transform: translateY(-2px);
}

/* ===========================
   Responsive
=========================== */

@media(max-width:768px){

    .container{
        padding: 25px;
    }

    .container h1{
        font-size: 1.7rem;
    }

}

@media(max-width:480px){

    body{
        padding: 15px;
    }

    .container{
        padding: 20px;
    }

    .container h1{
        font-size: 1.5rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
        font-size: 14px;
    }

}
   </style>
</head>
<body>

    <div class="container">

        <h1>Travel Registration Form</h1>

        <form action="/submit.php" method="post">

            <!-- Personal Information -->

            <div class="form-group">
                <label for="name">Full Name</label>
                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input
                    type="tel"
                    id="phone"
                    name="phone"
                    placeholder="Enter your phone number"
                    required
                >
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email address"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create a password"
                    required
                >
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth</label>
                <input
                    type="date"
                    id="dob"
                    name="dob"
                    required
                >
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="nationality">Nationality</label>
                <select id="nationality" name="nationality" required>
                    <option value="" disabled selected>Select Nationality</option>
                    <option value="indian">Indian</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Travel Information -->

            <div class="form-group">
                <label for="departure-city">Departure City</label>
                <input
                    type="text"
                    id="departure-city"
                    name="departure-city"
                    placeholder="Enter departure city"
                    required
                >
            </div>

            <div class="form-group">
                <label for="destination-city">Destination City</label>
                <input
                    type="text"
                    id="destination-city"
                    name="destination-city"
                    placeholder="Enter destination city"
                    required
                >
            </div>

            <div class="form-group">
                <label for="departure-date">Departure Date</label>
                <input
                    type="date"
                    id="departure-date"
                    name="departure-date"
                    required
                >
            </div>

            <div class="form-group">
                <label for="return-date">Return Date</label>
                <input
                    type="date"
                    id="return-date"
                    name="return-date"
                    required
                >
            </div>

            <div class="form-group">
                <label for="trip-type">Trip Type</label>
                <select id="trip-type" name="trip-type" required>
                    <option value="" disabled selected>Select Trip Type</option>
                    <option value="one-way">One Way</option>
                    <option value="round-trip">Round Trip</option>
                </select>
            </div>

            <div class="form-group">
                <label for="travellers">Number of Travellers</label>
                <input
                    type="number"
                    id="travellers"
                    name="travellers"
                    min="1"
                    max="20"
                    value="1"
                    required
                >
            </div>

            <div class="form-group">
                <label for="travel-class">Travel Class</label>
                <select id="travel-class" name="travel-class" required>
                    <option value="" disabled selected>Select Travel Class</option>
                    <option value="economy">Economy</option>
                    <option value="premium-economy">Premium Economy</option>
                    <option value="business">Business</option>
                    <option value="first-class">First Class</option>
                </select>
            </div>

            <div class="form-group">
                <label for="seat-preference">Seat Preference</label>
                <select id="seat-preference" name="seat-preference">
                    <option value="" disabled selected>Select Seat</option>
                    <option value="window">Window</option>
                    <option value="aisle">Aisle</option>
                    <option value="middle">Middle</option>
                </select>
            </div>

            <div class="form-group">
                <label for="meal">Meal Preference</label>
                <select id="meal" name="meal">
                    <option value="" disabled selected>Select Meal</option>
                    <option value="veg">Vegetarian</option>
                    <option value="non-veg">Non-Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
            </div>

            <div class="form-group">
                <label for="id-proof">Upload ID Proof</label>
                <input
                    type="file"
                    id="id-proof"
                    name="id-proof"
                >
            </div>

            <div class="form-group">
                <label for="requests">Special Requests</label>
                <textarea
                    id="requests"
                    name="requests"
                    rows="4"
                    placeholder="Enter any special requests..."
                ></textarea>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" required>
                    I agree to the Terms & Conditions.
                </label>
            </div>

            <div class="form-group">
                <input type="submit" value="Book Now">
            </div>

            <div class="form-group">
                <input type="reset" value="Reset Form">
            </div>

        </form>

    </div>

</body>
</html>
