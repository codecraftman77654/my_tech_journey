<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page </title>
  

    <style>

/* universal selector (Reset) */
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body */
body{
     font-family: Arial, Helvetica, sans-serif; 
     background: linear-gradient(135deg, #4facfe, #00f2fe); 
     height: 100vh; 
     display: flex; 
     justify-content: center; 
     align-items: center; 
}

/* Form  */
form{
background: #fff;
width: 380px;
padding: 15px;
border-radius: 15px;
box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
}

/* Heading */
h1{
    text-align: center;
    margin-bottom: 25px;
    color: #333;
    font-size: 32px;
}

/* Form */
div{
    margin-bottom: 18px;
}

/* Labels */
label{
    display: block;
    margin-bottom: 6px;
    font-weight: bold;
    color: #444;
}

/* inputs */
input[type="text"],
input[type="email"],
input[type="password"]{
    width: 100%;
    padding: 12px;
    border: 1px solod #ccc;
    border-radius: 8px;
    font-size: 15px;
    transition: 0.3s;
}

/* Input focus */
input[type="text"]:focus,
input[type="email"]:focus,
input[type="password"]:focus{
    border-color: #4facfe;
    outline: none;
    box-shadow: 0 0 8px rgba(79, 172, 254, 0.4);
}

/* Checkbox */
input[type="checkbox"]{
    margin-right: 8px;
}

div:nth-last-child(2){
    display: flex;
    align-items: center;
}

div:nth-last-child(2) label{
margin: 0px;
font-weight: normal;
}

/* Submit button */
input[type="submit"]{
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4facfe;
    color: navajowhite;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

input[type="submit"]:hover{
    background: #0d8bff;
    transform: translateY(-2px);
   transform: rotate(5deg);
}

/* placeholder */
::placeholder{
    color: #999;
}
    </style>

</head>


<body>
    <h1> Sign up</h1>
    <form action="/signup" method="post">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required placeholder="Enter Your Name">
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="Enter your email ">
        </div>

        <div>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password ">
        </div>

        <div>
            <label for="checkbox">Agree with terms and conditions</label>
            <input type="checkbox" id="checkbox" name="terms" required>
        </div>

        <div>
           
            <input type="submit"  value="sign up">
        </div>
    </form>
</body>
</html>
