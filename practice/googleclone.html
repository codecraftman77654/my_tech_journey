<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
       *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
       }

       body{
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #fff;
       }

       .container{
        display: flex;
        flex-direction: column;
        align-items: center;
       }

       h1{
        font-size: 70px;
        color: #4285f4;
        margin-bottom: 30px;
        font-weight: bold;
       }

       input[type="text"]{
        width: 550px;
        padding: 14px 20px;
        border: 1px solid #dcdcdc;
        border-radius: 30px;
        outline: none;
        font-size: 16px;
        box-shadow: 0 1px 6px rgba(30, 33, 36, .28);
       }

        input[type="text"]:focus{
            box-shadow: 0 2px 8px rgba(32, 33, 36, 35);
        }

        .buttons{
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }

        button{
            padding: 10px 18px;
            border: none;
            border-radius: 4px;
            background: #f8f9fa;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover{
            border: 1px solid #ccc;
            box-shadow: 0 1px 2px rgba(0,0,0,.1);
        }
    </style> 
</head>
<body>
    <h1>Google</h1>
    <input type="text" placeholder="Search google...">
    <div class="buttons">
        <button>Google Search</button>
        <button>I'm feeling lucky</button>
    </div>
    
    
</body>
</html>
